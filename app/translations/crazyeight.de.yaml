# --- Spielanleitung ---
rules: |-
    Bediene die oberste Karte der Ablage mit gleicher Farbe oder Zahl.
    Aussetzen-Karten setzen den nächsten Spieler aus, Richtungswechsel dreht die Zugreihenfolge um (bei zwei Spielern wie Aussetzen), eine +2 lässt den nächsten Spieler zwei Karten ziehen.
    Sonderkarten lassen dich eine Farbe wünschen; eine Sonderkarte +4 lässt den nächsten Spieler zusätzlich vier Karten ziehen.
    Eine passende Zieh-Karte kann auf eine offene Strafe gestapelt werden, statt selbst zu ziehen – falls der Host das erlaubt.
    Fängst du an, eine Strafe abzuziehen, musst du sie komplett ziehen – eine passende Karte zum Weitergeben geht dann nicht mehr.
    Kannst du nicht spielen, zieh eine Karte – passt sie immer noch nicht, setz aus.
    Wer zuerst seine Hand leert, gewinnt.
