# --- Spielanleitung ---
rules: |-
  Baue die vier Ablagestapel von Ass bis König auf - räum das ganze Deck ab, um zu gewinnen.
  Im Spielfeld stapelst du Karten absteigend, abwechselnd Rot und Schwarz.
  Eine Folge gestapelter Karten kannst du zusammen bewegen, solange die Reihenfolge stimmt.
  Nur ein König darf eine leere Spalte eröffnen.
  Zieh vom Stapel, wenn du nicht weiterkommst - ist er leer, dreh die Ablage zurück um, um sie erneut durchzugehen.
