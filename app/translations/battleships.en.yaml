# --- How to play ---
rules: |-
    Place your fleet on your own board - pick a shape from the tray, rotate it (button, mouse wheel, or by dragging a finger across the board), then tap a cell to drop it. Or use "Randomize" to place them all at once.
    Once both fleets are placed, take turns firing at a cell of your opponent's grid.
    A hit lets you know a ship was struck there; sinking every cell of a ship sinks it. Turns alternate on a miss; on a hit, they alternate too unless the host enabled "Shoot again after a hit".
    Sink every ship in your opponent's fleet before they sink yours to win.
    The ship pool, board size, and house rules are host-configurable in the lobby settings before the game starts.
