# --- Spielanleitung ---
rules: |-
    Ziehe zu Beginn deines Zuges eine Karte vom Stapel oder aus der Ablage und wirf am Ende eine ab.
    Melde Sätze (gleicher Wert) oder Folgen (gleiche Farbe) aus mindestens drei Karten.
    Deine Erstmeldung braucht mindestens 40 Punkte – danach darfst du auch einzelne Karten an alle Meldungen anlegen.
    Joker ersetzen jede beliebige Karte. Wer zuerst alle Karten los ist, gewinnt.
