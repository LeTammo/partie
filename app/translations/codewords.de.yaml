# --- Spielanleitung ---
rules: |-
    Bildet zwei Teams – Rot und Blau. Jedes Team braucht einen Informant, der die geheime Farbkarte kennt, und mindestens einen Ermittler, der rät.
    Auf dem 5×5-Brett liegen 25 Wörter: einige gehören zu Team Rot, einige zu Team Blau, sieben sind Zivilisten, eines ist der Verdächtige.
    Der Informant des startenden Teams gibt einen Hinweis: ein Wort und eine Zahl, die angibt, wie viele Brettwörter dazu passen. Der Hinweis darf kein Wort auf dem Brett sein.
    Die Ermittler dürfen daraufhin bis zu Zahl+1 Wörter aufdecken. Trefft ihr ein eigenes Wort, dürft ihr weiterraten oder freiwillig passen.
    Deckt ihr ein Wort des gegnerischen Teams oder einen Zivilisten auf, endet euer Zug sofort.
    Deckt ihr den Verdächtigen auf, verliert euer Team sofort – das andere Team gewinnt.
    Ein Team gewinnt, sobald alle eigenen Wörter aufgedeckt sind.
