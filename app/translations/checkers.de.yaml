# --- Spielanleitung ---
rules: |-
    Deine Steine ziehen diagonal vorwärts auf freie dunkle Felder.
    Gegnerische Steine schlägst du, indem du sie diagonal überspringst. Nach einem Sprung musst du mit demselben Stein weiterspringen, solange weitere Schläge möglich sind.
    Erreicht ein Stein die gegenüberliegende Seite, wird er zur Dame und darf auch rückwärts ziehen.
    Wer keine Steine oder keine Züge mehr hat, verliert.
