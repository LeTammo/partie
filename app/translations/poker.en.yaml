# --- How to play ---
rules: |-
    Texas Hold'em - each player gets two private hole cards, five community cards are shared.
    Betting happens before the flop, and again after the flop, turn and river; fold, check/call, or raise on your turn.
    Once the river is dealt, the best five-card hand made from your hole cards and the community cards wins the pot (side pots split correctly if someone is short-stacked and all-in).
    A hand ends immediately, uncontested, if everyone else folds.
    Play continues hand after hand until only one player still has chips.
