# --- Spielanleitung ---
rules: |-
    Platziere deine Flotte auf deinem eigenen Feld - wähle eine Form aus der Auswahl, drehe sie (Knopf, Mausrad oder durch Ziehen mit dem Finger über das Feld) und tippe dann auf ein Feld, um sie abzusetzen. Oder nutze „Zufällig verteilen", um alle auf einmal zu setzen.
    Sobald beide Flotten stehen, schießt ihr abwechselnd auf ein Feld des gegnerischen Rasters.
    Ein Treffer zeigt, dass dort ein Schiff getroffen wurde; sind alle Felder eines Schiffs getroffen, ist es versenkt. Bei einem Fehlschuss wechselt der Zug immer; bei einem Treffer auch, außer der Host hat „Bei Treffer erneut schießen" aktiviert.
    Versenke die gesamte gegnerische Flotte, bevor deine eigene versenkt wird, um zu gewinnen.
    Schiffspool, Spielfeldgröße und Hausregeln sind vom Host in den Lobby-Einstellungen konfigurierbar, bevor das Spiel startet.
