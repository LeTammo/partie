# --- Rules ---
rules: |-
    Form two teams – Red and Blue. Each team needs an Informant, who knows the secret color key, and at least one Detective, who guesses.
    The 5x5 board holds 25 words: some belong to Team Red, some to Team Blue, seven are Civilians, and one is the Suspect.
    The starting team's Informant gives a clue: one word and a number saying how many board words relate to it. The clue can't be a word on the board.
    The Detectives may then reveal up to number+1 words. Reveal one of your own words and you may keep guessing or pass voluntarily.
    Reveal the other team's word or a Civilian and your turn ends immediately.
    Reveal the Suspect and your team loses instantly – the other team wins.
    A team wins the moment all of their own words are revealed.
