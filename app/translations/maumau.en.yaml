# --- How to play ---
rules: |-
    Match the top card of the discard pile by suit or rank.
    A 7 makes the next player draw two (stackable), an 8 skips them, a jack lets you wish a suit.
    Once you start drawing off a penalty, you must draw all of it – you can no longer play a 7 to pass it on.
    If you cannot play, draw a card – if it still does not fit, pass.
    The first player to empty their hand wins.
