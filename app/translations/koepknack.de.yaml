# --- Spielanleitung ---
rules: |-
    Du hältst drei Karten und sammelst Punkte in einer Farbe – Ass zählt 11, Bilder 10. Drei Gleiche zählen 30,5.
    Bist du dran: Tausche eine Karte oder alle drei mit der Mitte, schiebe oder mache zu.
    Nach dem Zumachen ist jeder noch genau einmal dran, dann werden alle Hände aufgedeckt.
    31 Punkte („Knack") beenden die Runde sofort und decken alle Hände auf.
    Die beste Hand der Runde (bei Gleichstand mehrere) bekommt einen Punkt; nach 10 Runden gewinnt die höchste Summe.
