# --- How to play ---
rules: |-
    Roll two dice and move your checkers around the board in your own direction, bearing off past the far end.
    Doubles give you four moves of that value instead of two.
    A point held by two or more of your checkers is safe; a single checker (a blot) can be hit and sent to the bar.
    A checker on the bar must re-enter through the opponent's home board before you may move anything else.
    Once all fifteen of your checkers are in your home board, start bearing them off - overshooting with a die is only allowed once no checker sits further back.
    First to bear off all fifteen checkers wins. No doubling cube in this version.
