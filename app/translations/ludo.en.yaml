# --- How to play ---
rules: |-
  Race your four pawns around the board and home before anyone else.
  Roll a six to bring a pawn out of your base and onto the board.
  Rolling a six also grants an extra roll, whether or not you could use it.
  While all four of your pawns are still in your base, you get up to three rolls per turn, stopping early the moment you roll a six.
  Landing exactly on an opponent's pawn sends it back to their base.
  Once you've gone all the way around, turn into your own home stretch - you need an exact roll to reach the final square.
  First player to get all four pawns home wins.
