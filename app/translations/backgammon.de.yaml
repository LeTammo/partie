# --- Brett ---
backgammon.roll: 'Würfeln'
backgammon.moves_left: 'noch %count% Zug/Züge'
backgammon.off_count: '%count% draußen'
backgammon.bar_count: '%count% auf der Bar'

# --- Spielverlauf ---
log.backgammon.rolled: '%player% würfelt %a% und %b%.'
log.backgammon.moved: '%player% zieht einen Stein.'
log.backgammon.hit: '%player% schlägt einen einzelnen Stein – er geht auf die Bar.'
