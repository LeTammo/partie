# --- Spielanleitung ---
rules: |-
    Setzphase: Setze abwechselnd deine 9 Steine auf einen freien Punkt.
    Zugphase: Sobald alle Steine gesetzt sind, verschiebst du einen Stein entlang der Linien auf einen freien Nachbarpunkt.
    Bringst du drei deiner Steine auf eine markierte Linie – eine Mühle – darfst du einen gegnerischen Stein entfernen (Steine in einer Mühle sind geschützt, außer der Gegner hat nur noch Steine in Mühlen).
    Hast du nur noch 3 Steine, darfst du auf jeden freien Punkt springen statt nur auf einen Nachbarn.
    Du verlierst, wenn du weniger als 3 Steine hast oder am Zug keinen legalen Zug mehr machen kannst.
