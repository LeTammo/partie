# --- How to play ---
rules: |-
    Match the top card of the discard pile by color or number.
    Skip cards skip the next player, reverse cards flip the turn order (a skip with two players), a +2 makes the next player draw two.
    Wild cards let you wish a color; a wild +4 also makes the next player draw four.
    A matching draw card can be stacked onto a pending penalty instead of drawing, if the host allows it.
    If you cannot play, draw a card – if it still does not fit, pass.
    The first player to empty their hand wins.
