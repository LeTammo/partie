# --- Spielanleitung ---
rules: |-
    The goal of the game is to be the first player to discard all of your hand cards.
    The game must be started with the red eleven; if it is not held by any player, the eleven of Yellow/Orange, Green, or Blue starts.
    On your turn, you can play as many matching cards as you want (either one number higher or lower of the same color).
    You must play at least one card during your turn if you are able to do so.
    If you cannot play any cards, you must draw up to three cards from the face-down draw pile.
    You may strategically hold back cards to block other players, as long as you still play at least one other card.
