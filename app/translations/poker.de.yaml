# --- Spielanleitung ---
rules: |-
    Texas Hold'em - jeder Spieler bekommt zwei verdeckte Karten, dazu kommen fünf gemeinsame Karten.
    Es wird vor dem Flop gesetzt, und erneut nach Flop, Turn und River; passe (Check), gehe mit (Call), oder erhöhe (Raise), wenn du am Zug bist.
    Nach dem River gewinnt die beste Fünf-Karten-Hand aus deinen Karten und den Gemeinschaftskarten den Pot (Side-Pots werden korrekt aufgeteilt, wenn jemand mit weniger Chips all-in geht).
    Eine Hand endet sofort, wenn alle anderen aussteigen.
    Es wird Hand für Hand weitergespielt, bis nur noch ein Spieler Chips hat.
