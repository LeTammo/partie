# --- How to play ---
rules: |-
    Placing phase: take turns placing your 9 pieces on any free point.
    Moving phase: once all pieces are placed, slide a piece to an adjacent empty point along the lines.
    Line up three of your pieces on any marked line - a mill - to remove one of your opponent's pieces (pieces already in a mill are protected unless all of their pieces are in mills).
    Once you're down to 3 pieces, you may fly to any empty point instead of only an adjacent one.
    You lose when you have fewer than 3 pieces, or no legal move on your turn.
