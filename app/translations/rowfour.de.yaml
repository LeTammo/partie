# --- Brett ---
rowfour.drop: 'In Spalte %column% einwerfen'

# --- Einstellungen ---
setting.rowfour.connect_count: 'Steine in einer Reihe zum Gewinnen'
setting.rowfour.board_width: 'Spielfeldbreite'
setting.rowfour.board_height: 'Spielfeldhöhe'

# --- Spielverlauf ---
log.rowfour.dropped: '%player% wirft einen Stein in Spalte %column%.'
log.rowfour.won: '%player% hat vier verbunden!'

# --- Fehler ---
error.column_full: 'Diese Spalte ist voll.'

# --- Spielanleitung ---
rules: |-
    Werft abwechselnd einen Stein in eine Spalte – er fällt so tief wie möglich.
    Wer zuerst vier eigene Steine in einer Linie verbindet – waagerecht, senkrecht oder diagonal – gewinnt.
    Ist das Brett voll, endet die Partie unentschieden.
