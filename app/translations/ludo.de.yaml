# --- Spielanleitung ---
rules: |-
  Bringe deine vier Figuren als Erster einmal ums Brett und ins Ziel.
  Wirf eine Sechs, um eine Figur aus deinem Haus ins Spiel zu bringen.
  Eine Sechs gibt dir außerdem einen weiteren Wurf, egal ob du sie nutzen konntest.
  Solange noch alle vier Figuren in deinem Haus stehen, darfst du bis zu drei Mal würfeln - du hörst früher auf, sobald eine Sechs fällt.
  Landest du genau auf einer gegnerischen Figur, muss diese zurück ins Haus.
  Bist du einmal ganz herum, biegst du in deine eigene Zielgerade ein - dafür brauchst du die passende Augenzahl.
  Wer zuerst alle vier Figuren im Ziel hat, gewinnt.
