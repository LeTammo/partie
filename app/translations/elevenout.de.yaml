# --- Spielanleitung ---
rules: |-
    Ziel des Spiels ist es, als erster Spieler alle Handkarten abzulegen.
    Das Spiel wird immer mit der roten Elf eröffnet; fehlt diese, gilt die Reihenfolge Gelb/Orange, Grün, Blau für die erste Elf.
    In deinem Zug darfst du beliebig viele passende Karten anlegen (jeweils um eins höher oder niedriger in derselben Farbe).
    Du musst mindestens eine Karte ausspielen, wenn du regelkonform anlegen kannst.
    Kannst du keine Karte ablegen, musst du bis zu drei Karten nacheinander vom verdeckten Stapel ziehen.
    Du darfst passende Karten taktisch zurückhalten, um Mitspieler zu blockieren, solange du dennoch mindestens eine andere Karte ausspielst.
