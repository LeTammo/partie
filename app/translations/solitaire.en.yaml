# --- How to play ---
rules: |-
  Build the four foundations up from Ace to King, one suit each - clear the whole deck to win.
  In the tableau, stack cards in descending order, alternating red and black.
  A run of stacked cards can move together as long as it stays in that order.
  Only a King can start an empty tableau column.
  Draw from the stock when you're stuck - once it's empty, flip the waste back over to go through it again.
