# --- Spielanleitung ---
rules: |-
    Der Angreifer spielt eine Karte; der Verteidiger muss sie mit einer höheren Karte derselben Farbe oder einem Trumpf schlagen, oder alle Karten vom Tisch auf die Hand nehmen.
    Ist eine Karte geschlagen, darf der Angreifer eine weitere Karte mit einem bereits liegenden Wert nachlegen (bis zu 6 Karten, nie mehr als der Verteidiger auf der Hand hat) – nur der Angreifer darf nachlegen, immer eine Karte auf einmal.
    Sind alle Karten auf dem Tisch geschlagen, erklärt der Angreifer „fertig" – der Tisch kommt ab und der Verteidiger wird zum neuen Angreifer.
    Nach jeder Runde füllen beide Spieler ihre Hand vom Nachziehstapel wieder auf 6 Karten auf, der Angreifer zuerst.
    Sind Nachziehstapel und Trumpfkarte aufgebraucht, ist der Spieler, der als Erster keine Karten mehr hat, sicher – wer als Letzter Karten auf der Hand hält, ist der Durak.
