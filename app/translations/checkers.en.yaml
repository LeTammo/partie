# --- How to play ---
rules: |-
    Your pieces move diagonally forward onto free dark squares.
    Capture enemy pieces by jumping over them diagonally. After a capture you must keep jumping with the same piece as long as more captures are possible.
    A piece that reaches the far side is crowned a king and may also move backwards.
    Whoever runs out of pieces or possible moves loses.
