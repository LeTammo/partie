# --- Spielanleitung ---
rules: |-
    Pro Zug hast du bis zu drei Würfe. Klicke nach jedem Wurf Würfel an, um sie festzuhalten.
    Trage dein Ergebnis dann in eine freie Kategorie ein – jede Kategorie nur einmal.
    Oben (Einser bis Sechser) gibt es ab 63 Punkten +35 Bonus.
    Nach 13 Runden gewinnt die höchste Gesamtsumme.
