# --- How to play ---
rules: |-
    On your turn you have up to three rolls. After each roll, click dice to hold them.
    Then score your dice in a free category – each category can only be used once.
    The upper section (Ones to Sixes) pays a +35 bonus once you reach 63 points there.
    After 13 rounds, the highest total score wins.
