# --- How to play ---
rules: |-
    The attacker plays a card; the defender must beat it with a higher card of the same suit, or any trump, or take every card on the table into their hand.
    Once a card is beaten, the attacker may add another card of a rank already on the table (up to 6 cards, and never more than the defender's hand size) - only the attacker may add cards, one at a time.
    When every card on the table is beaten, the attacker declares "done" - the table is discarded and the defender becomes the new attacker.
    After each round both players refill their hand to 6 cards from the stock, attacker first.
    Once the stock and trump card are gone, the first player left holding cards when the other empties their hand is the durak.
