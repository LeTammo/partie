# --- How to play ---
rules: |-
    Start your turn by drawing a card from the stock or the discard pile, and end it by discarding one.
    Meld sets (same rank) or runs (same suit) of at least three cards.
    Your first meld must be worth at least 40 points – after that you may also lay off single cards on any meld.
    Jokers substitute for any card. The first player to get rid of all cards wins.
