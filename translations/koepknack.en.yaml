# --- How to play ---
rules: |-
    You hold three cards and collect points in one suit – ace counts 11, face cards 10. Three of a kind counts 30.5.
    On your turn, swap one card or all three with the middle, pass, or knock.
    After someone knocks, everyone gets exactly one more turn, then hands are revealed.
    31 points ("Knack") ends the round immediately and reveals all hands.
    The round's best hand (or hands, on a tie) scores a point; after 10 rounds, the highest total wins.
