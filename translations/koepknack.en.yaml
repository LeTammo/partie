# --- How to play ---
rules: |-
    You hold three cards and collect points in one suit – ace counts 11, face cards 10. Three of a kind counts 30.5.
    On your turn, swap one card or all three with the middle, pass, or knock.
    After someone knocks, everyone gets exactly one more turn, then the lowest hand loses a life.
    31 points ("Knack") ends the round immediately. Out of lives you are swimming – lose again and you are out.
    The last player standing wins.
