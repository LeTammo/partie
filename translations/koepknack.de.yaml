# --- Spielanleitung ---
rules: |-
    Du hältst drei Karten und sammelst Punkte in einer Farbe – Ass zählt 11, Bilder 10. Drei Gleiche zählen 30,5.
    Bist du dran: Tausche eine Karte oder alle drei mit der Mitte, schiebe oder mache zu.
    Nach dem Zumachen ist jeder noch genau einmal dran, dann verliert die niedrigste Hand ein Leben.
    31 Punkte („Knack") beenden die Runde sofort. Ohne Leben schwimmst du – verlierst du nochmal, bist du raus.
    Wer als Letzte:r übrig bleibt, gewinnt.
