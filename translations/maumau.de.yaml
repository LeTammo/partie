# --- Spielanleitung ---
rules: |-
    Bediene die oberste Karte der Ablage mit gleicher Farbe oder gleichem Wert.
    Eine 7 lässt den Nächsten zwei Karten ziehen (stapelbar), eine 8 lässt ihn aussetzen, mit einem Buben wünschst du dir eine Farbe.
    Kannst du nicht legen, ziehe eine Karte – passt sie immer noch nicht, passe.
    Wer zuerst alle Karten ablegt, gewinnt.
