# --- How to play ---
rules: |-
    Each round you first place a bet, then everyone gets two cards – the dealer shows one.
    Get closer to 21 than the dealer without going over. Aces count 1 or 11, face cards 10.
    "Hit" draws a card, "Stand" ends your turn, "Double" doubles your bet for exactly one more card.
    Blackjack (21 with two cards) pays 3:2. After five rounds, the player with the most chips wins.
