# --- Spielanleitung ---
rules: |-
    Jede Runde setzt du zuerst Chips, dann bekommen alle zwei Karten – die Bank zeigt eine.
    Komm näher an 21 als die Bank, ohne dich zu überkaufen. Ass zählt 1 oder 11, Bilder 10.
    „Karte" zieht eine Karte, „Halten" beendet deinen Zug, „Verdoppeln" verdoppelt den Einsatz für genau eine weitere Karte.
    Black Jack (21 mit zwei Karten) zahlt 3:2. Nach fünf Runden gewinnt, wer die meisten Chips hat.
