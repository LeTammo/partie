# --- Board ---
connectfour.drop: 'Drop into column %column%'

# --- Game log ---
log.connectfour.dropped: '%player% dropped a disc into column %column%.'
log.connectfour.won: '%player% connected four!'

# --- Errors ---
error.column_full: 'This column is full.'

# --- How to play ---
rules: |-
    Take turns dropping a disc into a column – it falls as far down as it can.
    The first player to connect four of their discs in a line – horizontally, vertically or diagonally – wins.
    If the board fills up, the game is a draw.
